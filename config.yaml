kafka:
  brokers:
    - "realty-kafka:9092"
  topic: "realty.flats"
  group_id: "flats-analyzer"

database:
  dsn: "postgres://realty_parser:password@realty-postgres:5432/realty_parser?sslmode=disable"

notifier:
  base_url: "http://users-notifier:8080"

logging:
  level: "info"
  file_path: "/var/log/flats-analyzer/app.log"

metrics:
  port: 9090